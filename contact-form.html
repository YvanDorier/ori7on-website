<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — ORI7ON Advisory</title>
<style>
/* Self-hosted fonts – no external CDN request */
@font-face { font-family: 'Cormorant Garamond'; font-style: normal; font-weight: 300; font-display: swap; src: url('/fonts/cormorant-garamond-latin-300-normal.woff2') format('woff2'); }
@font-face { font-family: 'Cormorant Garamond'; font-style: italic; font-weight: 300; font-display: swap; src: url('/fonts/cormorant-garamond-latin-300-italic.woff2') format('woff2'); }
@font-face { font-family: 'Cormorant Garamond'; font-style: normal; font-weight: 400; font-display: swap; src: url('/fonts/cormorant-garamond-latin-400-normal.woff2') format('woff2'); }
@font-face { font-family: 'Cormorant Garamond'; font-style: italic; font-weight: 400; font-display: swap; src: url('/fonts/cormorant-garamond-latin-400-italic.woff2') format('woff2'); }
@font-face { font-family: 'Cormorant Garamond'; font-style: normal; font-weight: 600; font-display: swap; src: url('/fonts/cormorant-garamond-latin-600-normal.woff2') format('woff2'); }
@font-face { font-family: 'Cormorant Garamond'; font-style: italic; font-weight: 600; font-display: swap; src: url('/fonts/cormorant-garamond-latin-600-italic.woff2') format('woff2'); }
@font-face { font-family: 'Jost'; font-style: normal; font-weight: 300; font-display: swap; src: url('/fonts/jost-latin-300-normal.woff2') format('woff2'); }
@font-face { font-family: 'Jost'; font-style: normal; font-weight: 400; font-display: swap; src: url('/fonts/jost-latin-400-normal.woff2') format('woff2'); }
@font-face { font-family: 'Jost'; font-style: normal; font-weight: 500; font-display: swap; src: url('/fonts/jost-latin-500-normal.woff2') format('woff2'); }
@font-face { font-family: 'Space Grotesk'; font-style: normal; font-weight: 300; font-display: swap; src: url('/fonts/space-grotesk-latin-300-normal.woff2') format('woff2'); }
@font-face { font-family: 'Space Grotesk'; font-style: normal; font-weight: 400; font-display: swap; src: url('/fonts/space-grotesk-latin-400-normal.woff2') format('woff2'); }
@font-face { font-family: 'Space Grotesk'; font-style: normal; font-weight: 500; font-display: swap; src: url('/fonts/space-grotesk-latin-500-normal.woff2') format('woff2'); }
@font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 300; font-display: swap; src: url('/fonts/jetbrains-mono-latin-300-normal.woff2') format('woff2'); }
@font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 400; font-display: swap; src: url('/fonts/jetbrains-mono-latin-400-normal.woff2') format('woff2'); }
@font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 500; font-display: swap; src: url('/fonts/jetbrains-mono-latin-500-normal.woff2') format('woff2'); }
</style>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:16px; -webkit-font-smoothing:antialiased; }
body {
  background: #f7f2ea;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3rem 1.5rem;
  overflow-x: hidden;
}

/* ── LANG SWITCHER ── */
.lang-sw {
  position: fixed; top:1.5rem; right:1.5rem;
  display: flex; align-items:center; gap:.2rem;
  z-index: 200;
  opacity: 0; animation: fadeUp .6s ease forwards .4s;
}
.lang-btn {
  font-family:'Jost',sans-serif; font-weight:500;
  font-size:.6rem; letter-spacing:.15em; text-transform:uppercase;
  background:none; border:none; color:rgba(28,18,8,.35);
  cursor:pointer; padding:.4em .5em; transition:color .25s;
}
.lang-btn.active { color:#1c1208; border-bottom:1.5px solid #CE9E5E; }
.lang-btn:hover  { color:#1c1208; }
.lang-sep { font-size:.6rem; color:rgba(28,18,8,.2); }

/* ── HEADER ── */
.hdr {
  text-align:center; margin-bottom:4rem;
  opacity:0; animation:fadeUp .8s ease forwards .15s;
}
.logo {
  font-family:'Jost',sans-serif; font-weight:500;
  font-size:.85rem; letter-spacing:.35em; text-transform:uppercase; color:#1c1208;
}
.logo span { color:#CE9E5E; }
.subtitle {
  font-family:'Cormorant Garamond',serif; font-weight:300; font-style:italic;
  font-size:.95rem; color:rgba(28,18,8,.5); margin-top:.4rem; letter-spacing:.05em;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── NARRATIVE CONTAINER ── */
.nf { max-width:700px; width:100%; position:relative; }

/* ── NARRATIVE LINE ── */
.nl {
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:1.5rem; line-height:2.7; color:#1c1208; margin-bottom:.1rem;
}
.nl .w { display:inline; transition:opacity .35s ease; }

/* Dimming when any field is focused */
body.ff .nl .w    { opacity:.3; }
body.ff .fw       { opacity:.3; }
body.ff .nl .w.hl { opacity:1 !important; }
body.ff .fw.fc    { opacity:1 !important; }

/* ── FIELD WRAPPER ── */
.fw {
  display:inline-block; position:relative;
  vertical-align:baseline; min-width:80px;
  transition:opacity .35s ease;
}
.fw.block { display:block; min-width:100%; margin-top:.2rem; }

/* ── TEXT INPUTS ── */
.fw input[type=text],
.fw input[type=email] {
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:1.5rem; line-height:2.7; color:#1c1208;
  background:transparent; border:none;
  border-bottom:2px solid transparent; outline:none;
  padding:0 .15em; min-width:80px; width:auto;
  transition:border-color .3s; caret-color:#CE9E5E;
  vertical-align:baseline;
}
.fw input::placeholder { font-style:italic; color:rgba(28,18,8,.22); font-weight:300; }
.fw input:focus { border-bottom-color:#CE9E5E; }

/* ── TEXTAREA ── */
.fw textarea {
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:1.5rem; line-height:1.85; color:#1c1208;
  background:transparent; border:none;
  border-bottom:2px solid transparent; outline:none;
  padding:.1em .15em; width:100%; resize:none; overflow:hidden;
  min-height:1.85em; caret-color:#CE9E5E;
  transition:border-color .3s; display:block;
}
.fw textarea::placeholder { font-style:italic; color:rgba(28,18,8,.22); font-weight:300; }
.fw textarea:focus { border-bottom-color:#CE9E5E; }

/* ── PHONE GROUP (CC select + number input inline) ── */
.phone-group {
  display:inline-flex; align-items:baseline;
  gap:.1em; vertical-align:baseline;
}
.cc-select {
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:1.5rem; line-height:2.7; color:#1c1208;
  background:transparent; border:none;
  border-bottom:2px solid transparent; outline:none;
  appearance:none; -webkit-appearance:none;
  cursor:pointer; padding:0 .15em;
  transition:border-color .3s; caret-color:#CE9E5E;
}
.cc-select:focus { border-bottom-color:#CE9E5E; }
.phone-inp {
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:1.5rem; line-height:2.7; color:#1c1208;
  background:transparent; border:none;
  border-bottom:2px solid transparent; outline:none;
  padding:0 .15em; min-width:120px; width:auto;
  transition:border-color .3s; caret-color:#CE9E5E;
}
.phone-inp::placeholder { font-style:italic; color:rgba(28,18,8,.22); font-weight:300; }
.phone-inp:focus { border-bottom-color:#CE9E5E; }

/* ── CUSTOM SUBJECT SELECT ── */
.csw {
  display:inline-block; position:relative;
  vertical-align:baseline; cursor:pointer;
}
.cs-trigger {
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:1.5rem; line-height:2.7; color:#1c1208;
  border:none; border-bottom:2px solid transparent;
  background:transparent; padding:0 1.5em 0 .15em;
  white-space:nowrap; transition:border-color .3s; display:inline-block;
  position:relative;
}
.cs-trigger::after {
  content:''; position:absolute; right:.25em; top:50%;
  transform:translateY(-50%);
  border-left:4px solid transparent; border-right:4px solid transparent;
  border-top:4px solid #CE9E5E; transition:transform .25s;
}
.csw.open .cs-trigger::after  { transform:translateY(-50%) rotate(180deg); }
.csw.open .cs-trigger,
.cs-trigger:hover              { border-bottom-color:#CE9E5E; }
.cs-trigger .ph                { font-style:italic; color:rgba(28,18,8,.22); }
.cs-dd {
  position:absolute; top:calc(100% + 4px); left:-.5em;
  background:#f7f2ea; border:1px solid rgba(206,158,94,.25);
  min-width:320px; z-index:100;
  opacity:0; visibility:hidden; transform:translateY(-6px);
  transition:all .22s ease;
  box-shadow:0 8px 28px rgba(28,18,8,.08);
}
.csw.open .cs-dd { opacity:1; visibility:visible; transform:translateY(0); }
.cs-opt {
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:1.1rem; color:#1c1208;
  padding:.6em 1.2em; cursor:pointer; transition:background .18s;
}
.cs-opt:hover  { background:rgba(206,158,94,.1); }
.cs-opt.sel    { color:#CE9E5E; }
.cs-native { position:absolute; opacity:0; width:0; height:0; pointer-events:none; }

/* ── SUBMIT ── */
.sub-row { text-align:right; margin-top:2.5rem; opacity:0; transition:opacity .5s ease; }
.sub-row.vis { opacity:1; }
.sub-btn {
  font-family:'Jost',sans-serif; font-weight:500;
  font-size:.75rem; letter-spacing:.2em; text-transform:uppercase;
  color:#f7f2ea; background:#002d1a; border:none;
  padding:1em 3.2em; cursor:pointer;
  border-radius:100px;
  position:relative;
  overflow:hidden;
  transition:background .3s, box-shadow .3s;
}
.sub-btn::before {
  content:'';
  position:absolute;
  top:0; left:-100%;
  width:60%; height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  transition:left 0.5s ease;
  pointer-events:none;
}
.sub-btn:hover::before { left:150%; }
.sub-btn:hover    { background:#003d24; box-shadow:0 4px 20px rgba(0,45,26,.2); }
.sub-btn:active   { opacity:0.85; }
.sub-btn:disabled { opacity:.45; cursor:not-allowed; box-shadow:none; }
.err-msg {
  font-family:'Jost',sans-serif; font-size:.7rem; letter-spacing:.08em;
  color:#9a4a1e; margin-top:.8rem; opacity:0; transition:opacity .3s;
}
.err-msg.vis { opacity:1; }

/* ── SUCCESS ��─ */
.success-msg {
  font-family:'Cormorant Garamond',serif; font-weight:300; font-style:italic;
  font-size:1.6rem; color:#1c1208; text-align:center;
  opacity:0; position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%); white-space:nowrap; pointer-events:none;
}
.success-msg.vis { opacity:1; transition:opacity .8s ease .3s; }
.nf.done .nc,
.nf.done .sub-row { opacity:0; transition:opacity .4s; pointer-events:none; }

/* ── FOOTER ── */
.ftr {
  margin-top:4rem; text-align:center;
  opacity:0; animation:fadeUp .6s ease forwards 3s;
}
.ftr p {
  font-family:'Jost',sans-serif; font-weight:400;
  font-size:.62rem; letter-spacing:.15em; text-transform:uppercase;
  color:rgba(28,18,8,.3);
}

/* ── HIDDEN SIZER ── */
.sizer {
  position:absolute; visibility:hidden; white-space:pre;
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:1.5rem; pointer-events:none;
}

/* ── RESPONSIVE ── */
@media(max-width:640px) {
  body { padding:2rem 1.2rem; justify-content:flex-start; padding-top:4.5rem; }
  .nl, .fw input, .fw textarea, .cs-trigger, .cc-select, .phone-inp { font-size:1.2rem; line-height:2.4; }
  .cs-dd { min-width:260px; }
  .hdr { margin-bottom:2.5rem; }
  .sub-btn { width:100%; }
}
</style>
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>

<!-- LANG SWITCHER -->
<div class="lang-sw">
  <button class="lang-btn active" id="btnFr">FR</button>
  <span class="lang-sep">/</span>
  <button class="lang-btn" id="btnEn">EN</button>
</div>

<!-- HEADER -->
<header class="hdr">
  <div class="logo">ORI<span>7</span>ON <span>·</span> ADVISORY</div>
  <div class="subtitle" id="subtitle"></div>
</header>

<!-- NARRATIVE FORM -->
<div class="nf" id="nf">
  <form id="cf" action="https://formspree.io/f/xbdzqlqd" method="POST">
    <div class="nc" id="nc"></div>
    <div class="sub-row" id="subRow">
      <button type="submit" class="sub-btn" id="subBtn"></button>
      <div class="err-msg" id="errMsg"></div>
    </div>
  </form>
  <div class="success-msg" id="successMsg"></div>
</div>

<!-- FOOTER -->
<footer class="ftr">
  <p>ORI7ON Advisory — Abidjan, Côte d'Ivoire</p>
</footer>

<!-- SIZER SPANS -->
<span class="sizer" id="sizer"></span>
<span class="sizer" id="ccSizer" style="font-size:1.5rem"></span>

<script>
/* ─── TRANSLATIONS ────────────────────────────────────────────────── */
const T = {
  fr: {
    subtitle : 'Prenons contact',
    submit   : 'Envoyer',
    sending  : '…',
    success  : 'Message transmis.',
    errFill  : 'Veuillez compléter tous les champs.',
    errEmail : 'Adresse email invalide.',
    ph: { name:'votre nom', role:'votre fonction', company:'votre organisation',
          message:'décrivez brièvement votre contexte…', email:'votre@email.com', phone:'numéro' },
    subjectPh: 'choisir un sujet',
    subjects: [
      { v:'conseil',     t:'le conseil stratégique et organisationnel' },
      { v:'direction',   t:'la direction externalisée' },
      { v:'ia',          t:"l\u2019implémentation de l\u2019IA dans mon entreprise" },
      { v:'implantation',t:'mon installation en Côte d\u2019Ivoire' },
      { v:'autre',       t:'différents sujets' }
    ],
    // Each line = array of tokens. String = text node, Object = field.
    narrative: [
      ['Je m\u2019appelle\u00a0', {f:'name'}, '.\u00a0 Je suis\u00a0', {f:'role'}, ' au sein de\u00a0', {f:'company'}, '\u00a0.'],
      ['Je souhaite échanger sur\u00a0', {f:'subject'}, '\u00a0.'],
      ['Voici ma situation en quelques mots\u00a0:'],
      [{f:'message'}],
      ['Vous pouvez me joindre à\u00a0', {f:'email'}, ' ou au\u00a0', {f:'phone'}, '.']
    ]
  },
  en: {
    subtitle : 'Get in touch',
    submit   : 'Send',
    sending  : '…',
    success  : 'Message sent.',
    errFill  : 'Please complete all fields.',
    errEmail : 'Invalid email address.',
    ph: { name:'your name', role:'your role', company:'your organization',
          message:'briefly describe your context…', email:'your@email.com', phone:'number' },
    subjectPh: 'choose a topic',
    subjects: [
      { v:'conseil',      t:'strategic and organizational advisory' },
      { v:'direction',    t:'fractional executive management' },
      { v:'ia',           t:'AI implementation in my company' },
      { v:'implantation', t:'establishing my business in Côte d\u2019Ivoire' },
      { v:'autre',        t:'various topics' }
    ],
    narrative: [
      ['My name is\u00a0', {f:'name'}, '.\u00a0 I am\u00a0', {f:'role'}, ' at\u00a0', {f:'company'}, '.'],
      ['I would like to discuss\u00a0', {f:'subject'}, '.'],
      ['Here is my situation in a few words:'],
      [{f:'message'}],
      ['You can reach me at\u00a0', {f:'email'}, ' or at\u00a0', {f:'phone'}, '.']
    ]
  }
};

/* ─── COUNTRY CODES (Africa-first) ────────────────────────────────── */
const CC = [
  { code:'+225', label:"🇨🇮 +225" }, { code:'+221', label:"🇸🇳 +221" },
  { code:'+237', label:"🇨🇲 +237" }, { code:'+223', label:"🇲🇱 +223" },
  { code:'+226', label:"🇧🇫 +226" }, { code:'+228', label:"🇹🇬 +228" },
  { code:'+229', label:"🇧🇯 +229" }, { code:'+224', label:"🇬🇳 +224" },
  { code:'+227', label:"🇳🇪 +227" }, { code:'+212', label:"🇲🇦 +212" },
  { code:'+216', label:"🇹🇳 +216" }, { code:'+234', label:"🇳🇬 +234" },
  { code:'+233', label:"🇬🇭 +233" }, { code:'+254', label:"🇰🇪 +254" },
  { code:'+27',  label:"🇿🇦 +27"  }, { code:'+255', label:"🇹🇿 +255" },
  { code:'+243', label:"🇨🇩 +243" }, { code:'+242', label:"🇨🇬 +242" },
  { code:'+241', label:"🇬🇦 +241" }, { code:'+250', label:"🇷🇼 +250" },
  { code:'+33',  label:"🇫🇷 +33"  }, { code:'+32',  label:"🇧🇪 +32"  },
  { code:'+41',  label:"🇨🇭 +41"  }, { code:'+44',  label:"🇬🇧 +44"  },
  { code:'+1',   label:"🇺🇸 +1"   }, { code:'+971', label:"🇦🇪 +971" }
];

/* ─── STATE ────────────────────────────────────────────────────────── */
let lang         = 'fr';
let selSubject   = '';    // selected subject value
let vals         = { name:'', role:'', company:'', message:'', email:'', phone:'' };

/* ─── DOM REFS ─────────────────────────────────────────────────────── */
const nc      = document.getElementById('nc');
const nf      = document.getElementById('nf');
const cf      = document.getElementById('cf');
const subBtn  = document.getElementById('subBtn');
const subRow  = document.getElementById('subRow');
const errMsg  = document.getElementById('errMsg');
const succMsg = document.getElementById('successMsg');
const sizer   = document.getElementById('sizer');
const ccSizer = document.getElementById('ccSizer');

/* ─── RENDER ───────────────────────────────────────────────────────── */
function render() {
  const t = T[lang];
  document.getElementById('subtitle').textContent = t.subtitle;
  subBtn.textContent = t.submit;
  succMsg.textContent = t.success;
  nc.innerHTML = '';

  const allEls = []; // for entrance animation

  t.narrative.forEach(line => {
    const lineDiv = document.createElement('div');
    lineDiv.className = 'nl';

    line.forEach(tok => {
      if (typeof tok === 'string') {
        // Split into word spans (preserving spaces/NBSP)
        tok.split(/(\s+)/).filter(Boolean).forEach(part => {
          const sp = document.createElement('span');
          sp.className = 'w';
          sp.textContent = part;
          lineDiv.appendChild(sp);
          allEls.push(sp);
        });
      } else {
        // Field token
        const fw = buildField(tok.f, t);
        lineDiv.appendChild(fw);
        allEls.push(fw);
      }
    });

    nc.appendChild(lineDiv);
  });

  // Rebuild subject dropdown options
  rebuildSubjectOptions(t);
  // Restore user-typed values
  restoreVals();
  // Auto-size inputs
  nc.querySelectorAll('input[type=text],input[type=email],.phone-inp').forEach(el => autoW(el));
  const ta = nc.querySelector('textarea');
  if (ta) autoH(ta);
  // Size CC select
  sizeCCSel();
  // Entrance animation
  entrance(allEls);
}

/* ─── BUILD FIELD ──────────────────────────────────────────────────── */
function buildField(name, t) {
  if (name === 'subject') return buildSubjectField(t);
  if (name === 'message') return buildMessageField(t);
  if (name === 'phone')   return buildPhoneField(t);

  const fw = document.createElement('span');
  fw.className = 'fw';
  fw.dataset.field = name;

  const inp = document.createElement('input');
  inp.type = name === 'email' ? 'email' : 'text';
  inp.name = name;
  inp.placeholder = t.ph[name];
  inp.required = (name === 'name' || name === 'email');
  inp.addEventListener('input',  () => { vals[name] = inp.value; autoW(inp); });
  inp.addEventListener('focus',  () => focusOn(fw));
  inp.addEventListener('blur',   () => schedBlur());

  fw.appendChild(inp);
  return fw;
}

function buildMessageField(t) {
  const fw = document.createElement('span');
  fw.className = 'fw block';
  fw.dataset.field = 'message';

  const ta = document.createElement('textarea');
  ta.name = 'message';
  ta.placeholder = t.ph.message;
  ta.rows = 1;
  ta.required = true;
  ta.addEventListener('input',  () => { vals.message = ta.value; autoH(ta); });
  ta.addEventListener('focus',  () => focusOn(fw));
  ta.addEventListener('blur',   () => schedBlur());

  fw.appendChild(ta);
  return fw;
}

function buildSubjectField(t) {
  const wrap = document.createElement('span');
  wrap.className = 'fw csw';
  wrap.id = 'csw';
  wrap.dataset.field = 'subject';

  const trigger = document.createElement('span');
  trigger.className = 'cs-trigger';
  trigger.id = 'csTrigger';
  trigger.tabIndex = 0;
  trigger.setAttribute('role', 'listbox');
  setTriggerText(trigger, t);

  const dd = document.createElement('div');
  dd.className = 'cs-dd';
  dd.id = 'csDD';

  const native = document.createElement('select');
  native.className = 'cs-native';
  native.name = 'subject';
  native.required = true;
  const defOpt = document.createElement('option');
  defOpt.value = ''; defOpt.disabled = true; defOpt.selected = !selSubject;
  native.appendChild(defOpt);

  trigger.addEventListener('click', e => {
    e.stopPropagation();
    wrap.classList.toggle('open');
    if (wrap.classList.contains('open')) focusOn(wrap);
  });
  trigger.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); trigger.click(); }
    if (e.key === 'Escape') wrap.classList.remove('open');
  });

  wrap.appendChild(trigger);
  wrap.appendChild(dd);
  wrap.appendChild(native);
  return wrap;
}

function rebuildSubjectOptions(t) {
  const dd      = document.getElementById('csDD');
  const trigger = document.getElementById('csTrigger');
  const native  = cf.querySelector('select[name="subject"]');
  const wrap    = document.getElementById('csw');
  if (!dd || !trigger || !native) return;

  dd.innerHTML = '';
  // Clear and rebuild native options
  while (native.options.length > 1) native.remove(1);

  t.subjects.forEach(s => {
    // Native option
    const opt = document.createElement('option');
    opt.value = s.v; opt.textContent = s.t;
    if (s.v === selSubject) opt.selected = true;
    native.appendChild(opt);

    // Custom option
    const div = document.createElement('div');
    div.className = 'cs-opt' + (s.v === selSubject ? ' sel' : '');
    div.textContent = s.t;
    div.addEventListener('click', e => {
      e.stopPropagation();
      selSubject = s.v;
      native.value = s.v;
      trigger.textContent = s.t; // plain text, no .ph span
      dd.querySelectorAll('.cs-opt').forEach(o => o.classList.remove('sel'));
      div.classList.add('sel');
      wrap.classList.remove('open');
      // Move focus to message field
      const ta = cf.querySelector('textarea');
      if (ta) setTimeout(() => ta.focus(), 120);
    });
    dd.appendChild(div);
  });

  // Set trigger display
  setTriggerText(trigger, t);
}

function setTriggerText(trigger, t) {
  if (selSubject) {
    const found = t.subjects.find(s => s.v === selSubject);
    trigger.textContent = found ? found.t : t.subjectPh;
  } else {
    trigger.innerHTML = '<span class="ph">' + t.subjectPh + '</span>';
  }
}

function buildPhoneField(t) {
  const fw = document.createElement('span');
  fw.className = 'fw';
  fw.dataset.field = 'phone';

  const group = document.createElement('span');
  group.className = 'phone-group';

  // Country code select
  const sel = document.createElement('select');
  sel.className = 'cc-select';
  sel.name = 'phone_cc';
  sel.id = 'ccSel';
  CC.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.code;
    opt.textContent = c.label;
    if (c.code === '+225') opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', sizeCCSel);
  sel.addEventListener('focus',  () => focusOn(fw));
  sel.addEventListener('blur',   () => schedBlur());

  // Phone number input
  const inp = document.createElement('input');
  inp.type = 'tel';
  inp.className = 'phone-inp';
  inp.name = 'phone';
  inp.placeholder = t.ph.phone;
  inp.addEventListener('input',  () => { vals.phone = inp.value; autoW(inp); });
  inp.addEventListener('focus',  () => focusOn(fw));
  inp.addEventListener('blur',   () => schedBlur());

  group.appendChild(sel);
  group.appendChild(inp);
  fw.appendChild(group);
  return fw;
}

/* ─── SIZE CC SELECT ───────────────────────────────────────────────── */
function sizeCCSel() {
  const sel = document.getElementById('ccSel');
  if (!sel) return;
  const txt = sel.options[sel.selectedIndex] ? sel.options[sel.selectedIndex].text : '🇨🇮 +225';
  ccSizer.textContent = txt + '\u2002';
  sel.style.width = (ccSizer.offsetWidth + 6) + 'px';
}

/* ─── AUTO-WIDTH INPUT ─────────────────────────────────────────────── */
function autoW(inp) {
  const val = inp.value || inp.placeholder || '';
  sizer.style.fontStyle = (!inp.value && inp.placeholder) ? 'italic' : 'normal';
  sizer.textContent = val;
  inp.style.width = Math.max(sizer.offsetWidth + 10, 70) + 'px';
}

/* ─── AUTO-HEIGHT TEXTAREA ─────────────────────────────────────────── */
function autoH(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

/* ─── RESTORE VALUES AFTER LANG SWITCH ────────────────────────────── */
function restoreVals() {
  ['name','role','company','email'].forEach(n => {
    const el = cf.querySelector('input[name="'+n+'"]');
    if (el && vals[n]) el.value = vals[n];
  });
  const ta = cf.querySelector('textarea');
  if (ta && vals.message) ta.value = vals.message;
  const ph = cf.querySelector('.phone-inp');
  if (ph && vals.phone) ph.value = vals.phone;
}

/* ─── FOCUS DIMMING ────────────────────────────────────────���───────── */
function focusOn(fw) {
  document.body.classList.add('ff');
  nc.querySelectorAll('.fw').forEach(el => el.classList.remove('fc'));
  nc.querySelectorAll('.w').forEach(el => el.classList.remove('hl'));
  fw.classList.add('fc');
  const line = fw.closest('.nl');
  if (line) line.querySelectorAll('.w').forEach(el => el.classList.add('hl'));
}

function schedBlur() {
  setTimeout(() => {
    const a = document.activeElement;
    if (!a || !a.closest('.fw,.csw,.cc-select,.phone-inp,.cs-dd')) {
      document.body.classList.remove('ff');
      nc.querySelectorAll('.fw').forEach(el => el.classList.remove('fc'));
      nc.querySelectorAll('.w').forEach(el => el.classList.remove('hl'));
    }
  }, 120);
}

/* ─── CLOSE DROPDOWNS ON OUTSIDE CLICK ────────────────────────────── */
document.addEventListener('click', e => {
  const csw = document.getElementById('csw');
  if (csw && !csw.contains(e.target)) csw.classList.remove('open');
});

/* ─── ENTRANCE ANIMATION ───────────────────────────────────────────── */
function entrance(items) {
  let delay = 200;
  items.forEach(el => {
    el.style.opacity = '0';
    el.style.transform = 'translateY(8px)';
    el.style.transition = 'none';
    setTimeout(() => {
      el.style.transition = 'opacity .4s ease, transform .4s ease';
      el.style.opacity = '1';
      el.style.transform = 'translateY(0)';
    }, delay);
    delay += 55;
  });
  setTimeout(() => subRow.classList.add('vis'), delay + 150);
}

/* ─── LANGUAGE SWITCH ──────────────────────────────────────────────── */
document.getElementById('btnFr').addEventListener('click', () => switchLang('fr'));
document.getElementById('btnEn').addEventListener('click', () => switchLang('en'));

function switchLang(l) {
  if (l === lang) return;
  // Save current values before re-render
  ['name','role','company','email'].forEach(n => {
    const el = cf.querySelector('input[name="'+n+'"]');
    if (el) vals[n] = el.value;
  });
  const ta = cf.querySelector('textarea');
  if (ta) vals.message = ta.value;
  const ph = cf.querySelector('.phone-inp');
  if (ph) vals.phone = ph.value;

  lang = l;
  document.documentElement.lang = l;
  document.querySelector('title').textContent = l === 'fr'
    ? 'Contact — ORI7ON Advisory'
    : 'Contact — ORI7ON Advisory';
  document.getElementById('btnFr').classList.toggle('active', l === 'fr');
  document.getElementById('btnEn').classList.toggle('active', l === 'en');
  render();
}

/* ─── FORM SUBMISSION ──────────────────────────────────────────────── */
cf.addEventListener('submit', async e => {
  e.preventDefault();
  const t = T[lang];

  const name    = (cf.querySelector('input[name="name"]')?.value    || '').trim();
  const email   = (cf.querySelector('input[name="email"]')?.value   || '').trim();
  const subject = selSubject;
  const message = (cf.querySelector('textarea[name="message"]')?.value || '').trim();

  // Validation
  if (!name || !email || !subject || !message) {
    showErr(t.errFill); return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showErr(t.errEmail); return;
  }

  subBtn.disabled = true;
  subBtn.textContent = t.sending;

  const formData = new FormData(cf);
  // Add phone_cc + phone as combined field
  const ccSel = document.getElementById('ccSel');
  const phInp = cf.querySelector('.phone-inp');
  if (ccSel && phInp && phInp.value) {
    formData.set('phone', ccSel.value + ' ' + phInp.value);
    formData.delete('phone_cc');
  }

  try {
    const res = await fetch(cf.action, {
      method: 'POST',
      body: formData,
      headers: { 'Accept': 'application/json' }
    });
    if (res.ok) {
      showSuccess();
    } else {
      throw new Error('server');
    }
  } catch {
    // Fallback: mailto
    const role    = (cf.querySelector('input[name="role"]')?.value    || '').trim();
    const company = (cf.querySelector('input[name="company"]')?.value || '').trim();
    const trig    = document.getElementById('csTrigger');
    const subText = trig ? trig.textContent : subject;
    const body    = encodeURIComponent(
      'Nom : '          + name    + '\n' +
      'Fonction : '     + role    + '\n' +
      'Organisation : ' + company + '\n' +
      'Sujet : '        + subText + '\n\n' +
      message
    );
    window.location.href = 'mailto:ydorier@ori7on.com'
      + '?subject=' + encodeURIComponent('ORI7ON — ' + subText)
      + '&body='    + body;
    setTimeout(showSuccess, 600);
  }
});

function showErr(msg) {
  errMsg.textContent = msg;
  errMsg.classList.add('vis');
  setTimeout(() => errMsg.classList.remove('vis'), 3500);
  subBtn.disabled = false;
  subBtn.textContent = T[lang].submit;
}

function showSuccess() {
  document.body.classList.remove('ff');
  nf.classList.add('done');
  succMsg.classList.add('vis');
}

/* ─── INIT ─────────────────────────────────────────────────────────── */
render();
</script>
</body>
</html>
