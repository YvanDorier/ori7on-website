<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORI7ON — Trajectoires de carrière</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --deep:   #002d1a;
  --green:  #0d3d20;
  --gold:   #CE9E5E;
  --goldl:  #D4B278;
  --cream:  #f7f2ea;
}
body {
  background: var(--deep);
  font-family: 'Jost', sans-serif;
  color: var(--cream);
  padding: 0;
}

/* ── MAP ── */
.wrap { position:relative; width:100%; max-width:880px; margin:0 auto;
  border:1px solid rgba(206,158,94,.1); }
#map { width:100%; height:auto; display:block; }

.country      { fill:#0d3d20; stroke:#1a5a30; stroke-width:.5; }
.graticule    { fill:none; stroke:rgba(206,158,94,.05); stroke-width:.4; }
.border-inner { fill:none; stroke:#1a5a30; stroke-width:.4; }
.border-outer { fill:none; stroke:#2a7040; stroke-width:.6; }

/* ── DOTS ── */
.dot-ring-main { fill:rgba(206,158,94,0); animation:pMain 2.5s ease-in-out infinite; }
.dot-ring      { fill:rgba(206,158,94,0); animation:pSec  3s   ease-in-out infinite; }
@keyframes pMain { 50%{ fill:rgba(206,158,94,.28); r:18; } }
@keyframes pSec  { 50%{ fill:rgba(206,158,94,.22); r:12; } }
.dot-core-main { fill:var(--gold); filter:drop-shadow(0 0 6px rgba(206,158,94,.8)); }
.dot-core      { fill:var(--gold); filter:drop-shadow(0 0 3px rgba(206,158,94,.5)); }
.city-lbl-main { font-family:'Jost',sans-serif; font-size:11px; font-weight:500;
  fill:var(--gold); pointer-events:none; }
.city-lbl      { font-family:'Jost',sans-serif; font-size:10px; font-weight:400;
  fill:rgba(212,178,120,.65); pointer-events:none; }
</style>
</head>
<body>

<div class="wrap"><svg id="map"></svg></div>

<script>
// ═══════════════════════════════════════════════
// DONNÉES
// ═══════════════════════════════════════════════
const CITIES = {
  abidjan:      { lat: 5.36,  lon: -4.01,  main:true,  iso:384 },
  daressalam:   { lat:-6.79,  lon: 39.21,             iso:834 },
  geita:        { lat:-2.87,  lon: 32.23,             iso:834 },
  bamako:       { lat:12.64,  lon: -8.00,             iso:466 },
  morila:       { lat:11.07,  lon: -6.83,             iso:466 },
  johannesburg: { lat:-26.20, lon: 28.04,             iso:710 },
  jinja:        { lat: 0.44,  lon: 33.20,             iso:800 },
  reunion:      { lat:-21.11, lon: 55.53,             iso:638 },
  brazzaville:  { lat:-4.27,  lon: 15.28,             iso:180 },
  pointenoire:  { lat:-4.78,  lon: 11.87,             iso:180 },
  dakar:        { lat:14.69,  lon:-17.44,             iso:686 },
  conakry:      { lat: 9.64,  lon:-13.58,             iso:324 },
  douala:       { lat: 4.05,  lon:  9.77,             iso:120 },
  alger:        { lat:36.75,  lon:  3.06,             iso: 12 },
  accra:        { lat: 5.56,  lon: -0.19,             iso:288 },
  dubai:        { lat:25.20,  lon: 55.27,             iso:784 },
};

const LABELS = {
  abidjan:      { dx: -10, dy: 18,  anchor:'end'   },
  daressalam:   { dx: 10, dy:-10,  anchor:'start' },
  geita:        { dx: 10, dy: 4,   anchor:'start' },
  bamako:       { dx:-10, dy: 4,   anchor:'end'   },
  morila:       { dx: 10, dy: -8,   anchor:'start' },
  johannesburg: { dx: 10, dy: 14,  anchor:'start' },
  jinja:        { dx: 10, dy: 4,   anchor:'start' },
  reunion:      { dx: 10, dy: 4,   anchor:'start' },
  brazzaville:  { dx: 10, dy: 4,   anchor:'start' },
  pointenoire:  { dx:-10, dy:-6,   anchor:'end'   },
  dakar:        { dx:-10, dy: 4,   anchor:'end'   },
  conakry:      { dx:-10, dy:-6,   anchor:'end'   },
  douala:       { dx: 10, dy: 14,  anchor:'start' },
  alger:        { dx: 10, dy: 4,   anchor:'start' },
  accra:        { dx: 10, dy:-10,  anchor:'start' },
  dubai:        { dx: 10, dy: 4,   anchor:'start' },
};

const CITY_NAMES = {
  fr: { abidjan:'Abidjan', daressalam:'Dar Es Salaam', geita:'Geita', bamako:'Bamako',
        morila:'Morila', johannesburg:'Johannesburg', jinja:'Jinja', reunion:'La Réunion',
        brazzaville:'Brazzaville', pointenoire:'Pointe-Noire', dakar:'Dakar',
        conakry:'Conakry', douala:'Douala', alger:'Alger', accra:'Accra', dubai:'Dubaï' },
  en: { abidjan:'Abidjan', daressalam:'Dar Es Salaam', geita:'Geita', bamako:'Bamako',
        morila:'Morila', johannesburg:'Johannesburg', jinja:'Jinja', reunion:'La Réunion',
        brazzaville:'Brazzaville', pointenoire:'Pointe-Noire', dakar:'Dakar',
        conakry:'Conakry', douala:'Douala', alger:'Algiers', accra:'Accra', dubai:'Dubai' },
};

// ── SÉQUENCES D'ARCS ──
const SEQUENCES = [
  { type:'seq', arcs:[
    { from:'abidjan',     to:'daressalam'  },
    { from:'daressalam',  to:'geita'       },
    { from:'geita',       to:'bamako'      },
    { from:'bamako',      to:'morila'      },
    { from:'morila',      to:'johannesburg'},
    { from:'johannesburg',to:'jinja'       },
    { from:'jinja',       to:'reunion'     },
    { from:'reunion',     to:'brazzaville' },
    { from:'brazzaville', to:'pointenoire' },
    { from:'pointenoire', to:'abidjan'     },
  ]},
  { type:'burst', from:'abidjan', targets:['bamako','dakar','conakry','douala','alger'] },
  { type:'seq', arcs:[
    { from:'abidjan', to:'accra'   },
    { from:'accra',   to:'abidjan' },
    { from:'abidjan', to:'dubai'   },
    { from:'dubai',   to:'abidjan' },
  ]},
];

// ═══════════════════════════════════════════════
// MAP SETUP
// ═══════════════════════════════════════════════
const W=880, H=800;
const svgEl = document.getElementById('map');
svgEl.setAttribute('viewBox',`0 0 ${W} ${H}`);
const svg = d3.select('#map');

const proj = d3.geoMercator().center([20,4]).scale(555).translate([W/2,H/2]);
const pathGen = d3.geoPath().projection(proj);

const graticule = d3.geoGraticule().step([10,10]);
svg.append('path').datum(graticule()).attr('class','graticule').attr('d',pathGen);

const layerCountries = svg.append('g').attr('id','lyr-countries');
const layerArcs      = svg.append('g').attr('id','lyr-arcs');
const layerDots      = svg.append('g').attr('id','lyr-dots');
const layerLabels    = svg.append('g').attr('id','lyr-labels');

function loadScript(src){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${src}"]`)){res();return;}
    const s=document.createElement('script');
    s.src=src; s.onload=res; s.onerror=rej;
    document.head.appendChild(s);
  });
}

Promise.all([
  loadScript('https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js'),
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2.0.2/countries-110m.json').then(r=>r.json())
]).then(([,world])=>{
  const countries = topojson.feature(world, world.objects.countries);

  layerCountries.selectAll('path')
    .data(countries.features)
    .enter().append('path')
    .attr('class', 'country')
    .attr('d', pathGen);

  layerCountries.append('path')
    .datum(topojson.mesh(world,world.objects.countries,(a,b)=>a!==b))
    .attr('class','border-inner').attr('d',pathGen);
  layerCountries.append('path')
    .datum(topojson.mesh(world,world.objects.countries,(a,b)=>a===b))
    .attr('class','border-outer').attr('d',pathGen);

  renderDots();
  startEngine();
}).catch(()=>{
  svg.append('text').attr('x',W/2).attr('y',H/2).attr('text-anchor','middle')
    .attr('fill','#CE9E5E').attr('font-size','14').text('Erreur réseau');
});

// ═══════════════════════════════════════════════
// DOTS
// ═══════════════════════════════════════════════
let currentLang = 'fr';

function renderDots(){
  Object.entries(CITIES).forEach(([id,c],i)=>{
    const [cx,cy]=proj([c.lon,c.lat]);
    const g=layerDots.append('g').attr('transform',`translate(${cx},${cy})`);

    g.append('circle')
      .attr('class', c.main?'dot-ring-main':'dot-ring')
      .attr('r', c.main?16:10)
      .style('animation-delay',`${i*.22}s`);
    g.append('circle')
      .attr('class', c.main?'dot-core-main':'dot-core')
      .attr('r', c.main?5.5:3.5);

    const lb=LABELS[id];
    layerLabels.append('text')
      .attr('class', c.main?'city-lbl-main':'city-lbl')
      .attr('x', cx+lb.dx).attr('y', cy+lb.dy)
      .attr('text-anchor', lb.anchor)
      .attr('id','lbl-'+id);
  });
  applyLang();
}

// ═══════════════════════════════════════════════
// I18N
// ═══════════════════════════════════════════════
function setLang(l){
  currentLang = l;
  applyLang();
}
function applyLang(){
  Object.keys(CITIES).forEach(id=>{
    const el=document.getElementById('lbl-'+id);
    if(el) el.textContent = CITY_NAMES[currentLang][id] || id;
  });
}

// ═══════════════════════════════════════════════
// ARC ENGINE
// ═══════════════════════════════════════════════
const PX_PER_SEC  = 200;
const BURST_DELAY = 120;
const FADE_DUR    = 1100;
const IMPACT_WAIT = 350;
const WAIT_SEQ    = 800;

const ARC_COLORS=['#CE9E5E','#D4B278','#E8C98A','#B88A4A','#F0D9A8','#C49050'];

let seqIdx=0, arcIdx=0, active=[], colorIdx=0;
let firstFrame=true, engineState='idle', waitUntil=0;
const animSpeed=1.24;

function pt(city){ const [x,y]=proj([CITIES[city].lon,CITIES[city].lat]); return {x,y}; }

function cpOf(A,B){
  const mx=(A.x+B.x)/2, my=(A.y+B.y)/2;
  const dx=B.x-A.x, dy=B.y-A.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const nx=-dy/dist, ny=dx/dist;
  const h=dist*Math.min(.65,Math.max(.22,dist*.0011+.2));
  const sign=ny>0?-1:1;
  return {x:mx+nx*h*sign, y:my+ny*h*sign};
}

function bezierLen(A,CP,B){
  let len=0, prev=A;
  for(let i=1;i<=20;i++){
    const t=i/20, m=1-t;
    const p={x:m*m*A.x+2*m*t*CP.x+t*t*B.x, y:m*m*A.y+2*m*t*CP.y+t*t*B.y};
    const dx=p.x-prev.x, dy=p.y-prev.y;
    len+=Math.sqrt(dx*dx+dy*dy);
    prev=p;
  }
  return len;
}

function bz(A,CP,B,t){
  const m=1-t;
  return {x:m*m*A.x+2*m*t*CP.x+t*t*B.x, y:m*m*A.y+2*m*t*CP.y+t*t*B.y};
}

function arcD(A,CP,B,tEnd){
  const N=52, steps=Math.max(2,Math.round(N*tEnd));
  let d='';
  for(let i=0;i<=steps;i++){
    const t=(tEnd/steps)*i, p=bz(A,CP,B,t);
    d+=i===0?`M${p.x.toFixed(1)},${p.y.toFixed(1)}`:`L${p.x.toFixed(1)},${p.y.toFixed(1)}`;
  }
  return d;
}

function launchArc(fromId,toId){
  const A=pt(fromId), B=pt(toId), CP=cpOf(A,B);
  const curveLen=bezierLen(A,CP,B);
  const dur=(curveLen/PX_PER_SEC)*1000/animSpeed;
  const col=ARC_COLORS[colorIdx%ARC_COLORS.length]; colorIdx++;
  const el=layerArcs.append('path')
    .attr('fill','none').attr('stroke',col)
    .attr('stroke-width',1.9).attr('stroke-linecap','round')
    .attr('opacity',0);
  const flash=layerArcs.append('circle')
    .attr('cx',B.x).attr('cy',B.y).attr('r',0)
    .attr('fill','none').attr('stroke',col).attr('stroke-width',1.5).attr('opacity',0);
  const arc={el,flash,A,B,CP,startTime:performance.now(),dur,phase:'fly',fadeStart:0,impacted:false};
  active.push(arc);
  return arc;
}

function tryAdvance(now){
  if(engineState!=='idle') return;
  const seq=SEQUENCES[seqIdx];
  if(seq.type==='seq'){
    if(arcIdx<seq.arcs.length){
      const a=seq.arcs[arcIdx];
      launchArc(a.from,a.to);
      arcIdx++;
      engineState='flying';
    } else {
      seqIdx=(seqIdx+1)%SEQUENCES.length;
      arcIdx=0;
      engineState='waiting';
      waitUntil=now+WAIT_SEQ;
    }
  } else if(seq.type==='burst'){
    const targets=seq.targets, fromId=seq.from;
    let maxDur=0;
    targets.forEach((toId,i)=>{
      const A=pt(fromId), B=pt(toId), CP=cpOf(A,B);
      const d=(bezierLen(A,CP,B)/PX_PER_SEC)*1000/animSpeed;
      if(d>maxDur) maxDur=d;
      setTimeout(()=>launchArc(fromId,toId), i*BURST_DELAY);
    });
    seqIdx=(seqIdx+1)%SEQUENCES.length;
    arcIdx=0;
    engineState='waiting';
    waitUntil=now+(targets.length-1)*BURST_DELAY+maxDur+FADE_DUR+IMPACT_WAIT;
  }
}

function loop(now){
  if(firstFrame){ engineState='idle'; firstFrame=false; }
  if(engineState==='waiting' && now>=waitUntil) engineState='idle';
  tryAdvance(now);

  const dead=[];
  active.forEach((arc,i)=>{
    const el=arc.el.node(); if(!el||!el.parentNode){ dead.push(i); return; }
    const e=now-arc.startTime;
    if(arc.phase==='fly'){
      const t=Math.min(e/arc.dur,1);
      arc.el.attr('d',arcD(arc.A,arc.CP,arc.B,t)).attr('opacity',t<.08?t/.08:1);
      if(t>=1 && !arc.impacted){
        arc.impacted=true;
        arc.phase='fade';
        arc.fadeStart=now;
        arc.flash.attr('opacity',.9).attr('r',7)
          .transition().duration(700).ease(d3.easeExpOut)
          .attr('r',24).attr('opacity',0);
        if(engineState==='flying'){ engineState='waiting'; waitUntil=now+IMPACT_WAIT; }
      }
    } else {
      const ft=Math.min((now-arc.fadeStart)/(FADE_DUR/animSpeed),1);
      arc.el.attr('opacity',Math.pow(1-ft,2.4));
      if(ft>=1) dead.push(i);
    }
  });
  dead.reverse().forEach(i=>{ active[i].el.remove(); active[i].flash.remove(); active.splice(i,1); });
  requestAnimationFrame(loop);
}

function startEngine(){ requestAnimationFrame(loop); }
</script>
</body>
</html>
