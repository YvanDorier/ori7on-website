<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --deep:   #002d1a;
  --green:  #0d3d20;
  --gold:   #CE9E5E;
  --goldl:  #D4B278;
  --cream:  #f7f2ea;
}
body {
  background: var(--deep);
  font-family: 'Jost', sans-serif;
  color: var(--cream);
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 36px 20px 52px;
}

/* ── MAP ── */
.wrap { position:relative; width:100%; max-width:880px;
  border:1px solid rgba(206,158,94,.1); }
#map { width:100%; height:auto; display:block; }

.country      { fill:#0d3d20; stroke:#1a5a30; stroke-width:.5; }
.graticule    { fill:none; stroke:rgba(206,158,94,.05); stroke-width:.4; }
.border-inner { fill:none; stroke:#1a5a30; stroke-width:.4; }
.border-outer { fill:none; stroke:#2a7040; stroke-width:.6; }

/* ── DOTS ── */
.dot-ring-main { fill:rgba(206,158,94,0); animation:pMain 2.5s ease-in-out infinite; }
.dot-ring      { fill:rgba(206,158,94,0); animation:pSec  3s   ease-in-out infinite; }
@keyframes pMain { 50%{ fill:rgba(206,158,94,.28); r:18; } }
@keyframes pSec  { 50%{ fill:rgba(206,158,94,.22); r:12; } }
.dot-core-main { fill:var(--gold); filter:drop-shadow(0 0 6px rgba(206,158,94,.8)); cursor:pointer; }
.dot-core      { fill:var(--gold); filter:drop-shadow(0 0 3px rgba(206,158,94,.5)); cursor:pointer; }
.dot-core-main:hover,.dot-core:hover { fill:#e8c070; }
.city-lbl-main { font-family:'Jost',sans-serif; font-size:11px; font-weight:500;
  fill:var(--gold); pointer-events:none; }
.city-lbl      { font-family:'Jost',sans-serif; font-size:10px; font-weight:400;
  fill:rgba(212,178,120,.65); pointer-events:none; }

/* ── TOOLTIP ── */
#tip {
  position:fixed; background:#001810;
  border:1px solid rgba(206,158,94,.45);
  max-width:340px; min-width:250px;
  pointer-events:none; opacity:0;
  transition:opacity .18s; z-index:200;
  box-shadow:0 8px 40px rgba(0,0,0,.65);
}
#tip.on { opacity:1; }
.tip-head {
  background:rgba(206,158,94,.07);
  border-bottom:1px solid rgba(206,158,94,.18);
  padding:11px 15px 9px;
}
.tip-city    { font-family:'Cormorant Garamond',serif; font-size:18px; color:var(--gold); display:block; }
.tip-country { font-size:11px; font-weight:300; color:rgba(212,178,120,.65);
  letter-spacing:.08em; text-transform:uppercase; display:block; margin-top:2px; }
.tip-period  { font-size:11px; color:var(--goldl); margin-top:6px; display:inline-block;
  border:1px solid rgba(206,158,94,.25); padding:2px 8px; letter-spacing:.06em; }
.tip-body { padding:11px 15px 13px; }
.tip-sector { font-size:11px; font-weight:500; color:rgba(212,178,120,.55);
  letter-spacing:.1em; text-transform:uppercase; margin-bottom:8px; }
.tip-missions { list-style:none; }
.tip-missions li { font-size:13px; font-weight:300; color:var(--cream);
  line-height:1.5; padding:3px 0 3px 14px; position:relative;
  border-bottom:1px solid rgba(206,158,94,.06); }
.tip-missions li:last-child { border-bottom:none; }
.tip-missions li::before { content:'—'; position:absolute; left:0; color:var(--gold); font-size:11px; }


/* ── CONTROLS — hidden, speed hardcoded ── */
.ctrl { display:none; }
.ctrl-btn { display:none; }
.spd-lbl { display:none; }
input[type=range] { display:none; }
</style>

function loadScript(src){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${src}"]`)){res();return;}
    const s=document.createElement('script');
    s.src=src; s.onload=res; s.onerror=rej;
    document.head.appendChild(s);
  });
}

// ═══════════════════════════════════════════════
// DOTS + TOOLTIPS
// ═══════════════════════════════════════════════
let currentLang='fr', pinnedId=null;

function renderDots(){
  Object.entries(CITIES).forEach(([id,c],i)=>{
    const [cx,cy]=proj([c.lon,c.lat]);
    const g=layerDots.append('g')
      .attr('transform',`translate(${cx},${cy})`)
      .style('cursor','pointer');

    g.append('circle')
      .attr('class', c.main?'dot-ring-main':'dot-ring')
      .attr('r', c.main?16:10)
      .style('animation-delay',`${i*.22}s`);
    g.append('circle')
      .attr('class', c.main?'dot-core-main':'dot-core')
      .attr('r', c.main?5.5:3.5);

    const lb=LABELS[id];
    layerLabels.append('text')
      .attr('class', c.main?'city-lbl-main':'city-lbl')
      .attr('x', cx+lb.dx).attr('y', cy+lb.dy)
      .attr('text-anchor', lb.anchor)
      .attr('id','lbl-'+id);

    // Zone de touch invisible 44px (mobile) — par-dessus le dot visuel
    g.append('circle')
      .attr('r', 22)
      .attr('fill', 'transparent')
      .attr('stroke', 'none');

    // Interactions desktop (mouse)
    g.on('mouseenter',function(ev){ if(!pinnedId) showTip(id,ev); })
     .on('mousemove', function(ev){ if(!pinnedId) posTip(ev); })
     .on('mouseleave',function(){   if(!pinnedId) hideTip(); })
     .on('click',function(ev){
       ev.stopPropagation();
       if(pinnedId===id){ pinnedId=null; hideTip(); }
       else { pinnedId=id; showTip(id,ev); }
     });

    // Interactions mobile (touch)
    g.on('touchstart',function(ev){
      ev.preventDefault();
      ev.stopPropagation();
      const t=ev.touches[0];
      const fakeEv={clientX:t.clientX, clientY:t.clientY};
      if(pinnedId===id){ pinnedId=null; hideTip(); }
      else { pinnedId=id; showTip(id,fakeEv); }
    });
  });
  document.addEventListener('click',()=>{ pinnedId=null; hideTip(); });
  applyLang();
}

function showTip(id,ev){
  const d=CONTENT[currentLang][id]; if(!d) return;
  const mis=d.missions.map(m=>`<li>${m}</li>`).join('');
  document.getElementById('tip').innerHTML=`
    <div class="tip-head">
      <span class="tip-city">${d.city}</span>
      <span class="tip-country">${d.country}</span>
      <span class="tip-period">${d.period}</span>
    </div>
    <div class="tip-body">
      <div class="tip-sector">${d.sector}</div>
      <ul class="tip-missions">${mis}</ul>
    </div>`;
  document.getElementById('tip').classList.add('on');
  if(ev) posTip(ev);
}
function posTip(ev){
  const tip=document.getElementById('tip');
  const m=16, vw=window.innerWidth, vh=window.innerHeight;
  const tw=tip.offsetWidth||300, th=tip.offsetHeight||180;
  // Sur mobile (écran étroit) : centré en bas
  if(vw<600){
    tip.style.left=Math.max(m,(vw-tw)/2)+'px';
    tip.style.top=(vh-th-m)+'px';
    return;
  }
  let x=ev.clientX+m, y=ev.clientY+m;
  if(x+tw>vw-m) x=ev.clientX-tw-m;
  if(y+th>vh-m) y=ev.clientY-th-m;
  tip.style.left=x+'px'; tip.style.top=y+'px';
}
function hideTip(){ document.getElementById('tip').classList.remove('on'); }

let animSpeed=1.24, animPaused=false, rafId=null;
// Vitesse constante en pixels SVG par seconde.
// Tous les arcs avancent à la même vitesse visuelle.

const FADE_DUR    = 1100;  // ms pour estomper après impact

const ARC_COLORS=['#CE9E5E','#D4B278','#E8C98A','#B88A4A','#F0D9A8','#C49050'];

// État engine — le suivant ne part QUE quand le précédent a atterri
let seqIdx=0;
let arcIdx=0;
let active=[];
let colorIdx=0;
let firstFrame=true;

let waitUntil=0;

function pt(city){ const [x,y]=proj([CITIES[city].lon,CITIES[city].lat]); return {x,y}; }

function cpOf(A,B){
  const mx=(A.x+B.x)/2, my=(A.y+B.y)/2;
  const dx=B.x-A.x, dy=B.y-A.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const nx=-dy/dist, ny=dx/dist;
  const h=dist*Math.min(.65,Math.max(.22,dist*.0011+.2));
  const sign=ny>0?-1:1;
  return {x:mx+nx*h*sign, y:my+ny*h*sign};
}

// Longueur approx d'une courbe de Bézier quadratique (subdivision)
function bezierLen(A,CP,B){
  let len=0, prev=A;
  const N=20;
  for(let i=1;i<=N;i++){
    const t=i/N, m=1-t;
    const p={x:m*m*A.x+2*m*t*CP.x+t*t*B.x, y:m*m*A.y+2*m*t*CP.y+t*t*B.y};
    const dx=p.x-prev.x, dy=p.y-prev.y;
    len+=Math.sqrt(dx*dx+dy*dy);
    prev=p;
  }
  return len;
}

function bz(A,CP,B,t){
  const m=1-t;
  return {x:m*m*A.x+2*m*t*CP.x+t*t*B.x, y:m*m*A.y+2*m*t*CP.y+t*t*B.y};
}

function arcD(A,CP,B,tEnd){
  const N=52, steps=Math.max(2,Math.round(N*tEnd));
  let d='';
  for(let i=0;i<=steps;i++){
    const t=(tEnd/steps)*i;
    const p=bz(A,CP,B,t);
    d+=i===0?`M${p.x.toFixed(1)},${p.y.toFixed(1)}`:`L${p.x.toFixed(1)},${p.y.toFixed(1)}`;
  }
  return d;
}

function launchArc(fromId,toId){
  const A=pt(fromId), B=pt(toId), CP=cpOf(A,B);
  // Durée = longueur de la courbe / vitesse → vitesse visuelle constante
  const curveLen=bezierLen(A,CP,B);
  const dur=(curveLen/PX_PER_SEC)*1000/animSpeed;
  const col=ARC_COLORS[colorIdx%ARC_COLORS.length]; colorIdx++;
  const el=layerArcs.append('path')
    .attr('fill','none').attr('stroke',col)
    .attr('stroke-width',1.9).attr('stroke-linecap','round')
    .attr('opacity',0);
  const flash=layerArcs.append('circle')
    .attr('cx',B.x).attr('cy',B.y).attr('r',0)
    .attr('fill','none').attr('stroke',col).attr('stroke-width',1.5).attr('opacity',0);
  const arc={el,flash,A,B,CP,
    startTime:performance.now(), dur,
    phase:'fly', fadeStart:0, impacted:false};
  active.push(arc);
  return arc;
}

// Moteur strict : prochain arc UNIQUEMENT après impact
function tryAdvance(now){
  if(engineState!=='idle') return;
  const seq=SEQUENCES[seqIdx];
  if(seq.type==='seq'){
    if(arcIdx<seq.arcs.length){
      const a=seq.arcs[arcIdx];
      launchArc(a.from,a.to);
      arcIdx++;
      engineState='flying';
    } else {
      seqIdx=(seqIdx+1)%SEQUENCES.length;
      arcIdx=0;
      engineState='waiting';
      waitUntil=now+WAIT_SEQ;
    }
  } else if(seq.type==='burst'){
    const targets=seq.targets, fromId=seq.from;
    // Durée max de la rafale = arc le plus long + FADE_DUR
    let maxDur=0;
    targets.forEach((toId,i)=>{
      const A=pt(fromId), B=pt(toId), CP=cpOf(A,B);
      const d=(bezierLen(A,CP,B)/PX_PER_SEC)*1000/animSpeed;
      if(d>maxDur) maxDur=d;
      setTimeout(()=>{ if(!animPaused) launchArc(fromId,toId); }, i*BURST_DELAY);
    });
    seqIdx=(seqIdx+1)%SEQUENCES.length;
    arcIdx=0;
    engineState='waiting';
    waitUntil=now+(targets.length-1)*BURST_DELAY+maxDur+FADE_DUR+IMPACT_WAIT;
  }
}

function loop(now){
  if(animPaused){ rafId=requestAnimationFrame(loop); return; }
  if(firstFrame){ engineState='idle'; firstFrame=false; }

  if(engineState==='waiting' && now>=waitUntil) engineState='idle';

  tryAdvance(now);

  const dead=[];
  active.forEach((arc,i)=>{
    const el=arc.el.node(); if(!el||!el.parentNode){ dead.push(i); return; }
    const e=now-arc.startTime;
    if(arc.phase==='fly'){
      const t=Math.min(e/arc.dur,1);
      const op=t<.08?t/.08:1;
      arc.el.attr('d',arcD(arc.A,arc.CP,arc.B,t)).attr('opacity',op);
      if(t>=1 && !arc.impacted){
        arc.impacted=true;
        arc.phase='fade';
        arc.fadeStart=now;
        arc.flash.attr('opacity',.9).attr('r',7)
          .transition().duration(700).ease(d3.easeExpOut)
          .attr('r',24).attr('opacity',0);
        if(engineState==='flying'){
          engineState='waiting';
          waitUntil=now+IMPACT_WAIT;
        }
      }
    } else {
      const ft=Math.min((now-arc.fadeStart)/(FADE_DUR/animSpeed),1);
      arc.el.attr('opacity',Math.pow(1-ft,2.4));
      if(ft>=1) dead.push(i);
    }
  });
  dead.reverse().forEach(i=>{
    active[i].el.remove(); active[i].flash.remove(); active.splice(i,1);
  });

  rafId=requestAnimationFrame(loop);
}

function startEngine(){ rafId=requestAnimationFrame(loop); }

// ── Contrôles ──
let paused=false;
function toggleAnim(){
  paused=!paused; animPaused=paused;
  document.getElementById('playbtn').textContent=paused?'▶ Play':'⏸ Pause';
}
function setSpeed(v){
  animSpeed=parseFloat(v);
  // Recalculer la durée restante de chaque arc actif proportionnellement
  active.forEach(a=>{
    const curveLen=bezierLen(a.A,a.CP,a.B);
    a.dur=(curveLen/PX_PER_SEC)*1000/animSpeed;
  });
}
</script>
